<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chat</title>

<style>
:root {
  --primary: #ff6a00;
  --primary-dark: #ff3c00;
  --bg-gradient: linear-gradient(180deg, #f8e9e5 0%, #f4f4f4 100%);
  --text-dark: #222;
  --text-light: #666;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Segoe UI", sans-serif;
}

body {
  background: var(--bg-gradient);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* Header */

.header {
  text-align: center;
  padding: 40px 20px 10px;
}

.header h1 {
  font-size: 36px;
  color: var(--text-dark);
}

.header p {
  color: var(--text-light);
  margin-top: 8px;
}

/* Chat Container */

.chat-container {
  flex: 1;
  max-width: 900px;
  width: 100%;
  margin: 40px auto;
  display: flex;
  flex-direction: column;
  padding: 0 20px;
}

/* Response Box */

.response-box {
  flex: 1;
  background: white;
  border-radius: 25px;
  padding: 30px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.08);
  overflow-y: auto;
  margin-bottom: 25px;
  font-size: 18px;
  line-height: 1.7;
  color: var(--text-dark);
}

/* Input Area */

.input-area {
  display: flex;
  gap: 15px;
  background: white;
  padding: 15px 20px;
  border-radius: 40px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
  border: 2px solid rgba(255,106,0,0.2);
  transition: 0.3s;
}

.input-area:focus-within {
  border-color: var(--primary);
  box-shadow: 0 15px 40px rgba(255,106,0,0.2);
}

.input-area input {
  flex: 1;
  border: none;
  outline: none;
  font-size: 18px;
}

.send-btn {
  background: linear-gradient(90deg, var(--primary), var(--primary-dark));
  border: none;
  padding: 12px 28px;
  border-radius: 30px;
  color: white;
  font-weight: 600;
  cursor: pointer;
  transition: 0.3s ease;
}

.send-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 25px rgba(255,106,0,0.4);
}
</style>
</head>

<body>

<div class="header">
  <h1>AI Assistant</h1>
  <p>Ask anything. Get intelligent answers.</p>
</div>

<div class="chat-container">

  <div class="response-box" id="response">
    Your AI responses will appear here...
  </div>

  <div class="input-area">
    <input id="userInput" type="text" placeholder="Type your question..." />
    <button class="send-btn" onclick="sendRequest()">Send</button>
  </div>

</div>

<script>
async function sendRequest() {
  const input = document.getElementById("userInput").value;
  const responseBox = document.getElementById("response");

  if (!input.trim()) {
    responseBox.innerHTML = "Please enter a question.";
    return;
  }

  responseBox.innerHTML = "Thinking...";

  try {
    const response = await fetch("http://127.0.0.1:8000/generate-text", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ prompt: input })
    });

    const data = await response.json();
   responseBox.innerHTML = data.ai_response;

  } catch (error) {
    responseBox.innerHTML = "Backend not reachable.";
  }
}

document.getElementById("userInput")
  .addEventListener("keypress", function(e) {
    if (e.key === "Enter") sendRequest();
  });
</script>

</body>
</html>
